layout: page
title: Letter Game
permalink: /letter-game/
---

<style>
  :root {
    --pg-ink: #25302b;
    --pg-muted: #6d756f;
    --pg-paper: #fffaf1;
    --pg-line: #ded4c1;
    --pg-accent: #c73e5a;
    --pg-accent-2: #2f7d73;
    --pg-gold: #efb84a;
  }

  .pg-shell {
    min-height: 72vh;
    margin: -8px -4px 0;
    padding: 22px 0 34px;
    color: var(--pg-ink);
    direction: rtl;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .pg-top {
    display: grid;
    gap: 8px;
    margin-bottom: 22px;
  }

  .pg-kicker {
    color: var(--pg-accent);
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .pg-title {
    margin: 0;
    color: var(--pg-ink);
    font-size: clamp(1.7rem, 10vw, 3rem);
    line-height: 1;
    letter-spacing: 0;
  }

  .pg-note {
    max-width: 34rem;
    margin: 0;
    color: var(--pg-muted);
    font-size: 1rem;
    line-height: 1.55;
  }

  .pg-progress {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 18px 0 12px;
    padding: 12px 14px;
    border: 1px solid var(--pg-line);
    border-radius: 8px;
    background: var(--pg-paper);
  }

  .pg-progress strong {
    color: var(--pg-accent-2);
  }

  .pg-reset {
    appearance: none;
    border: 1px solid #d8c8ad;
    border-radius: 999px;
    background: #fff;
    color: var(--pg-ink);
    min-height: 40px;
    padding: 0 14px;
    font-weight: 800;
    cursor: pointer;
  }

  .pg-sentence {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    align-items: center;
    direction: rtl;
    padding: 18px 0 8px;
  }

  .pg-letter {
    appearance: none;
    width: clamp(42px, 13.5vw, 62px);
    aspect-ratio: 1;
    border: 1px solid #cfc2aa;
    border-radius: 8px;
    background: linear-gradient(180deg, #fff 0%, #fff6e4 100%);
    box-shadow: 0 5px 0 #d9caaf;
    color: transparent;
    display: grid;
    place-items: center;
    font-size: clamp(1.25rem, 7vw, 2rem);
    font-weight: 900;
    line-height: 1;
    text-decoration: none;
    transform: translateY(0);
    transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
  }

  .pg-letter:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #d9caaf;
  }

  .pg-letter.is-solved {
    border-color: #d7a93f;
    background: #fff2c3;
    box-shadow: 0 5px 0 #ddb452;
    color: var(--pg-ink);
  }

  .pg-space {
    width: clamp(18px, 5vw, 28px);
    height: 1px;
  }

  .pg-footer {
    margin-top: 22px;
    color: var(--pg-muted);
    font-size: 0.95rem;
  }

  .pg-heart-stage {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    overflow: hidden;
  }

  .pg-heart {
    position: absolute;
    left: var(--x);
    top: var(--y);
    color: var(--color);
    font-size: var(--size);
    line-height: 1;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
    animation: pg-heart-burst 1200ms ease-out forwards;
    animation-delay: var(--delay);
    text-shadow: 0 2px 8px rgba(199, 62, 90, 0.2);
  }

  @keyframes pg-heart-burst {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
    }

    12% {
      opacity: 1;
    }

    100% {
      opacity: 0;
      transform: translate(
        calc(-50% + var(--dx)),
        calc(-50% + var(--dy))
      ) scale(1) rotate(var(--rot));
    }
  }

  @media (max-width: 520px) {
    .pg-shell {
      margin: -12px -8px 0;
      padding: 16px 0 28px;
    }

    .pg-progress {
      align-items: stretch;
      flex-direction: column;
    }

    .pg-reset {
      width: 100%;
    }
  }
</style>

<main class="pg-shell">
  <div class="pg-top">
    <div class="pg-kicker">חידה קטנה</div>
    <h1 class="pg-title">מצאו את המשפט</h1>
    <p class="pg-note">לוחצים על ריבוע, פותרים את חידת התמונות, והריבוע הופך לאות.</p>
  </div>

  <div class="pg-progress" aria-live="polite">
    <span><strong id="pg-count">0</strong> אותיות נמצאו</span>
    <button class="pg-reset" id="pg-reset" type="button">איפוס</button>
  </div>

  <div class="pg-sentence" id="pg-sentence" aria-label="secret sentence"></div>
  <p class="pg-footer" id="pg-complete" hidden>פתרת הכל.</p>
</main>

<script src="{{ '/assets/js/partner-letter-game-data.js' | relative_url }}"></script>
<script>
(function() {
  const GAME = window.PARTNER_LETTER_GAME;
  const PUZZLES = GAME.puzzles;
  const sentence = GAME.sentence;
  const sentenceEl = document.getElementById("pg-sentence");
  const countEl = document.getElementById("pg-count");
  const resetEl = document.getElementById("pg-reset");
  const completeEl = document.getElementById("pg-complete");

  const state = readProgress();

  render();

  resetEl.addEventListener("click", function() {
    if (!confirm("לאפס את ההתקדמות?")) return;
    writeCookie(cookieName(), "", -1);
    location.reload();
  });

  function render() {
    sentenceEl.innerHTML = "";
    let puzzleIndex = 0;

    sentence.split("").forEach(function(char) {
      if (char === " ") {
        const space = document.createElement("span");
        space.className = "pg-space";
        sentenceEl.appendChild(space);
        return;
      }

      const puzzle = PUZZLES[puzzleIndex];
      if (!puzzle) return;
      const solved = state[puzzleIndex] === true;
      const link = document.createElement("a");
      link.className = "pg-letter" + (solved ? " is-solved" : "");
      link.href = "{{ '/letter-puzzle/' | relative_url }}?p=" + puzzleIndex;
      link.textContent = solved ? puzzle.letter : "?";
      link.setAttribute("aria-label", solved ? "Solved letter " + puzzle.letter : "Open puzzle " + (puzzleIndex + 1));
      sentenceEl.appendChild(link);
      puzzleIndex += 1;
    });

    const solvedCount = PUZZLES.filter(function(_, index) { return state[index] === true; }).length;
    countEl.textContent = solvedCount + " / " + PUZZLES.length;
    completeEl.hidden = solvedCount !== PUZZLES.length;

    if (solvedCount === PUZZLES.length && !state.__heartsShown) {
      state.__heartsShown = true;
      writeCookie(cookieName(), JSON.stringify(state), 365);
      launchHeartFireworks();
    }
  }

  function launchHeartFireworks() {
    const stage = document.createElement("div");
    stage.className = "pg-heart-stage";
    stage.setAttribute("aria-hidden", "true");
    document.body.appendChild(stage);

    const colors = ["#c73e5a", "#e85d75", "#f08a9b", "#efb84a", "#2f7d73"];
    const bursts = [
      { x: 24, y: 34 },
      { x: 50, y: 24 },
      { x: 76, y: 36 },
      { x: 36, y: 58 },
      { x: 64, y: 60 }
    ];

    bursts.forEach(function(burst, burstIndex) {
      for (let i = 0; i < 18; i += 1) {
        const angle = (Math.PI * 2 * i) / 18;
        const distance = 58 + Math.random() * 92;
        const heart = document.createElement("span");
        heart.className = "pg-heart";
        heart.textContent = "♥";
        heart.style.setProperty("--x", burst.x + "vw");
        heart.style.setProperty("--y", burst.y + "vh");
        heart.style.setProperty("--dx", Math.cos(angle) * distance + "px");
        heart.style.setProperty("--dy", Math.sin(angle) * distance + "px");
        heart.style.setProperty("--rot", (Math.random() * 240 - 120) + "deg");
        heart.style.setProperty("--size", (18 + Math.random() * 18) + "px");
        heart.style.setProperty("--delay", (burstIndex * 130 + Math.random() * 90) + "ms");
        heart.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
        stage.appendChild(heart);
      }
    });

    setTimeout(function() {
      stage.remove();
    }, 2400);
  }

  function cookieName() {
    return "pg_" + GAME.gameId;
  }

  function readProgress() {
    const raw = document.cookie.split("; ").find(row => row.startsWith(cookieName() + "="));
    if (!raw) return {};
    try {
      return JSON.parse(decodeURIComponent(raw.split("=").slice(1).join("="))) || {};
    } catch (error) {
      return {};
    }
  }

  function writeCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
  }
})();
</script>
